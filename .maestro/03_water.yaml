appId: app.kaly.mobile
name: "Water Tracker"
---
# Step 1: Scroll to water section
- scrollUntilVisible:
    element: ".*au.*|.*ater.*|.*oda.*"
    direction: DOWN

# Step 2: Verify water section visible
- assertVisible: ".*au.*|.*ater.*|.*oda.*"
- assertVisible: "0 / 8"
- takeScreenshot: "11_water_initial"

# Step 3: Tap + button
- tapOn:
    id: "diary.add_water"
    optional: true
- tapOn:
    text: ".*"
    index: 0
    optional: true
- delay: 1000

# Step 4: Verify counter changed
- takeScreenshot: "12_water_after_add"

# Step 5: Tap - button
- tapOn:
    id: "diary.remove_water"
    optional: true
- delay: 1000

# Step 6: Verify counter went back
- takeScreenshot: "13_water_after_remove"
